<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Apresentações</title>
    <!-- Fontes do Google para ficar idêntico ao PDF -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- html2canvas para capturar cada slide -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <!-- jsPDF para montar o PDF -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="logoBase64.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Editor -->
        <aside class="sidebar">
            <h2>Gerador de Apresentação</h2>
            
            <div class="form-group">
                <label for="primaryColor">Cor da Identidade (Hexadecimal)</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="primaryColor" value="#00e5ff">
                    <input type="text" id="primaryColorText" value="#00e5ff">
                </div>
            </div>
            
            <div class="form-group">
                <label>Logo da Empresa (Capa e Rodapé)</label>
                <input type="file" id="companyLogo" accept="image/*">
            </div>

            <hr>

            <!-- Título / Capa -->
            <div class="section-title">
                <input type="checkbox" id="showCover" checked> 
                <label for="showCover">1. Capa</label>
            </div>
            <div class="form-group">
                <label for="coverSubtitle">Palavra Menor (Ex: FÓRMULA)</label>
                <input type="text" id="coverSubtitle" value="FÓRMULA">
            </div>
            <div class="form-group">
                <label for="coverTitle">Título Principal</label>
                <input type="text" id="coverTitle" value="TRÁFEGO PAGO + IA">
            </div>
            <div class="form-group">
                <label for="coverDescription">Subtítulo Descritivo</label>
                <textarea id="coverDescription" rows="3">Aprenda a criar anúncios no Facebook e Instagram usando Claude, ChatGPT e Gemini ao seu lado</textarea>
            </div>
            <div class="form-group">
                <label for="coverWebsite">Site</label>
                <input type="text" id="coverWebsite" value="www.altaoffice.com.br">
            </div>
            <div class="form-group">
                <label for="coverStats">Texto Abaixo do Site</label>
                <input type="text" id="coverStats" value="5 MIL ALUNOS • 100 EMPRESAS • 20K SEGUIDORES">
            </div>

            <hr>

            <!-- SOBRE O CURSO -->
            <div class="section-title">
                <input type="checkbox" id="showCourse" checked>
                <label for="showCourse">2. Sobre o Curso</label>
            </div>
            <div class="form-group">
                <label>Título em destaque (Azul)</label>
                <input type="text" id="courseCardTitle" value="Você não precisa virar gestor de tráfego.">
            </div>
            <div class="form-group">
                <label>Texto sobre o curso</label>
                <textarea id="courseCardText" rows="5">Você precisa entender o suficiente para não depender de ninguém — e usar IA para criar campanhas completas em horas, não dias.
Use Claude, ChatGPT e Gemini como assistentes de marketing: gere copy, criativos, roteiros e análises enquanto você foca em crescer seu negócio.</textarea>
            </div>
            <div class="form-group">
                <label>Para quem é este curso (um por linha)</label>
                <textarea id="targetListText" rows="6">Empresários que querem anunciar com autonomia, sem depender de terceiros
Donos de negócios locais que querem vender mais pelo Facebook e Instagram
Profissionais que querem usar IA no tráfego pago para trabalhar mais rápido
Quem já tentou anunciar e não teve retorno — e quer entender o que errou
Gestores de tráfego que querem escalar usando ferramentas de IA</textarea>
            </div>

            <hr>

            <!-- Quem Somos -->
            <div class="section-title">
                <input type="checkbox" id="showAbout" checked>
                <label for="showAbout">3. Quem Somos</label>
            </div>
            <div class="form-group">
                <label for="aboutUsText">Texto</label>
                <textarea id="aboutUsText" rows="6">Alta Office Educação é uma empresa especializada em aplicar IA, marketing e tecnologia para gerar resultados reais nos negócios.

Formamos empresários e profissionais que dominam o digital — com aulas práticas, ferramentas reais e modelos prontos para aplicar no dia seguinte.</textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Dado 1</label>
                    <input type="text" id="stat1Title" value="5 MIL">
                    <input type="text" id="stat1Sub" value="ALUNOS">
                </div>
                <div class="form-group">
                    <label>Dado 2</label>
                    <input type="text" id="stat2Title" value="100">
                    <input type="text" id="stat2Sub" value="EMPRESAS">
                </div>
                <div class="form-group">
                    <label>Dado 3</label>
                    <input type="text" id="stat3Title" value="20K">
                    <input type="text" id="stat3Sub" value="SEGUIDORES">
                </div>
            </div>

            <hr>

            <!-- Módulos -->
            <div class="section-title">
                <input type="checkbox" id="showModules" checked>
                <label for="showModules">4. Módulos</label>
            </div>
            <div id="modulesContainer">
                <div class="form-group module-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Título do Módulo</label>
                        <button type="button" onclick="removeModule(this)" style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 0.85em; text-decoration: underline; padding: 0;">Remover</button>
                    </div>
                    <input type="text" class="mod-title" value="MÓDULO 01">
                    <label>Subtítulo do Módulo</label>
                    <input type="text" class="mod-sub" value="FUNDAMENTOS: COMO O META ADS PENSA — E COMO A IA TE DÁ VANTAGEM">
                    <label>Tópicos (Use [IA] no início para destaque)</label>
                    <textarea class="mod-topics" rows="5">Como funciona o ecossistema do Facebook e Instagram Ads
Por que o botão "Turbinar" desperdiça seu dinheiro
Diferença entre impulsionar posts e campanhas estratégicas
Estrutura profissional: Gerenciador de Negócios do zero
[IA] ChatGPT e Claude para entender métricas sem estudar sozinho</textarea>
                </div>

                <div class="form-group module-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Título do Módulo</label>
                        <button type="button" onclick="removeModule(this)" style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 0.85em; text-decoration: underline; padding: 0;">Remover</button>
                    </div>
                    <input type="text" class="mod-title" value="MÓDULO 02">
                    <label>Subtítulo do Módulo</label>
                    <input type="text" class="mod-sub" value="CONFIGURAÇÃO DE CAMPANHAS COM IA: DO ZERO AO PIXEL FUNCIONANDO">
                    <label>Tópicos (Use [IA] no início para destaque)</label>
                    <textarea class="mod-topics" rows="5">Como criar campanhas do zero com objetivo de vendas
Configuração de Pixel e eventos de conversão
Segmentação geográfica inteligente para sua cidade e região
Estruturação de campanhas para negócios locais
[IA] Gemini para diagnosticar erros de configuração e sugerir ajustes</textarea>
                </div>

                <div class="form-group module-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Título do Módulo</label>
                        <button type="button" onclick="removeModule(this)" style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 0.85em; text-decoration: underline; padding: 0;">Remover</button>
                    </div>
                    <input type="text" class="mod-title" value="MÓDULO 03">
                    <label>Subtítulo do Módulo</label>
                    <input type="text" class="mod-sub" value="PÚBLICOS CAMPEÕES: COMO IDENTIFICAR QUEM COMPRA DE VOCÊ">
                    <label>Tópicos (Use [IA] no início para destaque)</label>
                    <textarea class="mod-topics" rows="5">Como criar públicos de alta performance
Segmentação demográfica, por interesses e comportamentos
Públicos personalizados: lista de clientes e visitantes do site
Públicos semelhantes (Lookalike) para encontrar novos compradores
[IA] Claude para analisar seu público ideal e sugerir segmentações</textarea>
                </div>

                <div class="form-group module-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Título do Módulo</label>
                        <button type="button" onclick="removeModule(this)" style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 0.85em; text-decoration: underline; padding: 0;">Remover</button>
                    </div>
                    <input type="text" class="mod-title" value="MÓDULO 04">
                    <label>Subtítulo do Módulo</label>
                    <input type="text" class="mod-sub" value="CONVERSÃO DIRETA: COPY E CRIATIVOS GERADOS COM IA EM MINUTOS">
                    <label>Tópicos (Use [IA] no início para destaque)</label>
                    <textarea class="mod-topics" rows="5">Estrutura de campanhas para vendas diretas
Campanhas com objetivo de WhatsApp e mensagens
Como criar anúncios que param o scroll e geram clique
Testes A/B de criativos e copies
[IA] Copies completos com Claude e ChatGPT em menos de 5 minutos</textarea>
                </div>

                <div class="form-group module-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Título do Módulo</label>
                        <button type="button" onclick="removeModule(this)" style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 0.85em; text-decoration: underline; padding: 0;">Remover</button>
                    </div>
                    <input type="text" class="mod-title" value="MÓDULO 05">
                    <label>Subtítulo do Módulo</label>
                    <input type="text" class="mod-sub" value="REMARKETING INTELIGENTE: O MÉTODO RIV NA PRÁTICA">
                    <label>Tópicos (Use [IA] no início para destaque)</label>
                    <textarea class="mod-topics" rows="5">Como criar funis de remarketing eficientes
Recuperação de visitantes que não compraram
Sequências de anúncios para cada etapa da jornada
Remarketing para lista de clientes (upsell e reativação)
[IA] Montagem automática de sequências de mensagens por público</textarea>
                </div>

                <div class="form-group module-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Título do Módulo</label>
                        <button type="button" onclick="removeModule(this)" style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 0.85em; text-decoration: underline; padding: 0;">Remover</button>
                    </div>
                    <input type="text" class="mod-title" value="MÓDULO 06">
                    <label>Subtítulo do Módulo</label>
                    <input type="text" class="mod-sub" value="MÉTRICAS QUE IMPORTAM: IA ANALISANDO SEUS DADOS, VOCÊ DECIDINDO">
                    <label>Tópicos (Use [IA] no início para destaque)</label>
                    <textarea class="mod-topics" rows="5">CAC, LTV, CPL — o que realmente importa e como calcular
Como interpretar dados além dos números rasos
Identificar campanhas, conjuntos e anúncios vencedores
Quando pausar, quando escalar e quando otimizar
[IA] Gemini e ChatGPT para diagnóstico completo com sugestões de ação</textarea>
                </div>

                <div class="form-group module-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Título do Módulo</label>
                        <button type="button" onclick="removeModule(this)" style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 0.85em; text-decoration: underline; padding: 0;">Remover</button>
                    </div>
                    <input type="text" class="mod-title" value="MÓDULO 07">
                    <label>Subtítulo do Módulo</label>
                    <input type="text" class="mod-sub" value="ESCALA SEM PERDER PERFORMANCE">
                    <label>Tópicos (Use [IA] no início para destaque)</label>
                    <textarea class="mod-topics" rows="5">Escalonamento vertical e horizontal
Como aumentar orçamento sem quebrar a campanha
Gestão de múltiplas campanhas simultâneas
Planejamento de budget para negócios locais
[IA] Simular cenários de escala e projetar resultados com IA</textarea>
                </div>

                <div class="form-group module-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Título do Módulo</label>
                        <button type="button" onclick="removeModule(this)" style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 0.85em; text-decoration: underline; padding: 0;">Remover</button>
                    </div>
                    <input type="text" class="mod-title" value="MÓDULO 08">
                    <label>Subtítulo do Módulo</label>
                    <input type="text" class="mod-sub" value="CRIATIVOS PROFISSIONAIS COM IA: SEM DESIGNER, SEM AGÊNCIA">
                    <label>Tópicos (Use [IA] no início para destaque)</label>
                    <textarea class="mod-topics" rows="4">Imagens profissionais para anúncios com IA generativa
Criativos de alta conversão sem conhecimento em design
Edição e adaptação para feed, stories e reels
Identidades visuais e materiais promocionais com IA</textarea>
                </div>

                <div class="form-group module-item">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="margin: 0;">Título do Módulo</label>
                        <button type="button" onclick="removeModule(this)" style="background: none; border: none; color: #ff4444; cursor: pointer; font-size: 0.85em; text-decoration: underline; padding: 0;">Remover</button>
                    </div>
                    <input type="text" class="mod-title" value="MÓDULO 09">
                    <label>Subtítulo do Módulo</label>
                    <input type="text" class="mod-sub" value="VÍDEOS QUE VENDEM: ROTEIRO, PRODUÇÃO E EDIÇÃO 100% COM IA">
                    <label>Tópicos (Use [IA] no início para destaque)</label>
                    <textarea class="mod-topics" rows="4">Roteiros para vídeos de vendas com Claude e ChatGPT
Produção de vídeos com IA — sem câmera, sem estúdio
Vídeos otimizados para Instagram, Facebook e WhatsApp
Adaptação do mesmo vídeo para múltiplos formatos</textarea>
                </div>
            </div>
            <button class="btn-primary" onclick="addModule()" style="background-color: #2a2b2e; color: #fff; margin-top: 10px;">+ Adicionar Módulo</button>

            <hr>

            <!-- Bônus -->
            <div class="section-title">
                <input type="checkbox" id="showBonus" checked>
                <label for="showBonus">5. Bônus</label>
            </div>
            <div class="form-group">
                <label for="bonusTitle">Título</label>
                <input type="text" id="bonusTitle" value="SEU ASSISTENTE DE TRÁFEGO COM IA">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Coluna 1</label>
                    <input type="text" id="col1Title" value="CLAUDE">
                    <textarea id="col1Items" rows="3">Copy de anúncio do zero
Variações de headline</textarea>
                </div>
                <div class="form-group">
                    <label>Coluna 2</label>
                    <input type="text" id="col2Title" value="CHATGPT">
                    <textarea id="col2Items" rows="3">Hooks e aberturas em escala
Variações de criativos</textarea>
                </div>
                <div class="form-group">
                    <label>Coluna 3</label>
                    <input type="text" id="col3Title" value="GEMINI">
                    <textarea id="col3Items" rows="3">Análise de métricas
Comparação de campanhas</textarea>
                </div>
            </div>

            <hr>

            <!-- Método RIV -->
            <div class="section-title">
                <input type="checkbox" id="showRiv" checked>
                <label for="showRiv">6. Método</label>
            </div>
            <div class="form-group">
                <label for="rivTitle">Título do Método</label>
                <input type="text" id="rivTitle" value="RIV">
            </div>
            <div class="form-group">
                <label>Letra 1 (Ex: R)</label>
                <div class="form-row">
                    <input type="text" id="rivRLetter" value="R" style="width: 50px; text-align: center;">
                    <input type="text" id="rivRTitle" value="Remarketing" style="flex: 1;">
                </div>
                <textarea id="rivRDesc" rows="2">Impacte as pessoas certas, no momento certo.</textarea>
            </div>
            <div class="form-group">
                <label>Letra 2 (Ex: I)</label>
                <div class="form-row">
                    <input type="text" id="rivILetter" value="I" style="width: 50px; text-align: center;">
                    <input type="text" id="rivITitle" value="Inteligência" style="flex: 1;">
                </div>
                <textarea id="rivIDesc" rows="2">Colete, interprete e use dados reais.</textarea>
            </div>
            <div class="form-group">
                <label>Letra 3 (Ex: V)</label>
                <div class="form-row">
                    <input type="text" id="rivVLetter" value="V" style="width: 50px; text-align: center;">
                    <input type="text" id="rivVTitle" value="Vendas com Previsibilidade" style="flex: 1;">
                </div>
                <textarea id="rivVDesc" rows="2">Construa um sistema que gera resultados consistentes mês após mês.</textarea>
            </div>

            <hr>

            <!-- Mentor -->
            <div class="section-title">
                <input type="checkbox" id="showMentor" checked>
                <label for="showMentor">7. Seu Mentor</label>
            </div>
            <div class="form-group">
                <label>Foto do Mentor</label>
                <input type="file" id="mentorPhoto" accept="image/*">
            </div>
            <div class="form-group">
                <label for="mentorName">Nome do Mentor</label>
                <input type="text" id="mentorName" value="Miqueias">
            </div>
            <div class="form-group">
                <label for="mentorHandle">Instagram (@)</label>
                <input type="text" id="mentorHandle" value="@miqueias.rp">
            </div>
            <div class="form-group">
                <label for="mentorBio">Biografia (uma linha por item)</label>
                <textarea id="mentorBio" rows="6">Empresário e estrategista digital
Fundador de duas empresas que vendem 100% pela internet
Certificado Google Ads AI Performance
Certificado Anthropic (Claude AI)</textarea>
            </div>

            <hr>

            <!-- Investimento -->
            <div class="section-title">
                <input type="checkbox" id="showInvestment" checked>
                <label for="showInvestment">8. Investimento & Contatos</label>
            </div>
            <div class="form-group">
                <label for="invText">Texto Investimento</label>
                <textarea id="invText" rows="3">Os valores são informados diretamente via WhatsApp pelo nosso time comercial, garantindo que você receba as melhores condições.</textarea>
            </div>
            <div class="form-group">
                <label for="reqText">Pré-requisitos (um por linha)</label>
                <textarea id="reqText" rows="3">Ter uma conta no Instagram ou Facebook
Acesso a uma ferramenta de IA gratuita</textarea>
            </div>
            <div class="form-group">
                <label for="contactText">Contatos (Telefone/Email)</label>
                <textarea id="contactText" rows="3">+55 66 9639-6190
+55 66 9209-2307
miqueias@altaoffice.com.br</textarea>
            </div>

            <hr>
            <!-- Obrigado -->
            <div class="section-title">
                <input type="checkbox" id="showThanks" checked>
                <label for="showThanks">9. Obrigado</label>
            </div>
            <div class="form-group">
                <label for="thanksWebsite">Site</label>
                <input type="text" id="thanksWebsite" value="www.altaoffice.com.br">
            </div>
            <div class="form-group">
                <label for="thanksFooter">Rodapé</label>
                <input type="text" id="thanksFooter" value="ALTA OFFICE EDUCAÇÃO • @altaoffice">
            </div>

            <!-- Botão Imprimir -->
            <hr>
            <button class="btn-primary" onclick="downloadPDF()" id="downloadBtn">Baixar em PDF</button>
            <p id="downloadStatus" style="font-size:0.8rem; color:#888; margin-top:5px; text-align:center;">Clique para gerar e baixar o PDF da apresentação.</p>
        </aside>

        <!-- Presentation Preview -->
        <main class="preview-area">
            <div id="presentation" class="presentation">
                <!-- Slides gerados aqui -->
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
